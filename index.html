<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Employee of Three Month — Vote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">

  <!-- Netlify Identity (login email) -->
  <script defer src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    :root{
      --bg:#0b1020; --card:rgba(255,255,255,.08); --stroke:rgba(255,255,255,.14);
      --text:rgba(255,255,255,.92); --muted:rgba(255,255,255,.68);
      --a:#38bdf8; --b:#34d399;
      --r:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:"Plus Jakarta Sans",system-ui; color:var(--text);
      background: radial-gradient(900px 700px at 15% 10%, rgba(56,189,248,.20), transparent 60%),
                  radial-gradient(900px 700px at 85% 20%, rgba(52,211,153,.16), transparent 60%),
                  linear-gradient(180deg,#05060a,var(--bg));
      min-height:100vh;
    }
    header{position:sticky;top:0;background:rgba(5,6,10,.45);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08)}
    .wrap{max-width:1100px;margin:0 auto;padding:18px}
    .row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .brand b{font-size:14px}
    .brand div{font-size:12px;color:var(--muted);margin-top:4px}
    .btn{
      border:none; cursor:pointer; padding:10px 14px; border-radius:999px;
      background:linear-gradient(135deg,var(--a),var(--b)); color:#071018; font-weight:800;
    }
    .btn.secondary{
      background:rgba(255,255,255,.06); color:var(--text); border:1px solid var(--stroke);
      font-weight:800;
    }
    main{padding:18px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    @media(max-width:960px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:620px){.grid{grid-template-columns:1fr}}
    .card{
      border:1px solid var(--stroke); background:var(--card); border-radius:22px; padding:14px;
      transition:transform .15s ease, border-color .15s ease;
      cursor:pointer;
    }
    .card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.22)}
    .top{display:flex;gap:12px;align-items:center}
    .ava{width:52px;height:52px;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.16)}
    .ava img{width:100%;height:100%;object-fit:cover;display:block}
    .name{font-weight:900}
    .meta{font-size:12px;color:var(--muted);margin-top:4px}
    .pill{display:inline-block;margin-top:10px;font-size:12px;color:rgba(255,255,255,.78);padding:7px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05)}
    .panel{
      margin-top:16px; border-radius:22px; border:1px solid var(--stroke); background:rgba(255,255,255,.06);
      padding:14px; display:grid; grid-template-columns:.9fr 1.1fr; gap:14px;
    }
    @media(max-width:900px){.panel{grid-template-columns:1fr}}
    .big{border-radius:18px; overflow:hidden; border:1px solid rgba(255,255,255,.14); min-height:240px}
    .big img{width:100%;height:100%;object-fit:cover;display:block}
    .detail h2{margin:0 0 6px;font-size:18px}
    .detail p{margin:0 0 12px;color:var(--muted);line-height:1.6;font-size:13px}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .chip{font-size:12px;padding:7px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.82)}
    .status{font-size:12px;color:var(--muted)}
    .toast{margin-top:10px;font-size:12px;color:rgba(255,255,255,.78)}
    a{color:rgba(56,189,248,.95);text-decoration:none}
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="row">
      <div class="brand">
        <b>Employee of Three Month — Vote</b>
        <div id="period">Periode: Jan–Mar 2026</div>
      </div>
      <div class="row" style="justify-content:flex-end">
        <button class="btn secondary" id="btnAdmin" title="Halaman admin (harus role admin)">Admin</button>
        <button class="btn secondary" id="btnLogin">Login</button>
        <button class="btn" id="btnLogout" style="display:none">Logout</button>
      </div>
    </div>
    <div class="status" id="authState">Status: belum login</div>
  </div>
</header>

<main class="wrap">
  <div class="grid" id="grid"></div>

  <section class="panel" id="panel" style="display:none">
    <div class="big"><img id="pImg" alt="Foto kandidat"></div>
    <div class="detail">
      <h2 id="pName">—</h2>
      <div class="meta" id="pMeta">—</div>
      <p id="pBio">—</p>
      <div class="chips" id="pChips"></div>

      <div class="row" style="justify-content:flex-start">
        <button class="btn" id="btnVote">Vote kandidat ini</button>
        <button class="btn secondary" id="btnClose">Tutup</button>
      </div>
      <div class="toast" id="toast"></div>
      <div class="status" style="margin-top:10px">
        Catatan: 1 akun = 1 vote (divalidasi server). Untuk rekap: <a href="/admin.html">admin page</a>.
      </div>
    </div>
  </section>
</main>

<script>
  // ====== DATA (edit sesuai kandidat) ======
  const PERIOD = "Jan–Mar 2026";
  const CANDIDATES = [
    { id:"e01", name:"Alya Putri", unit:"Direktorat A", role:"Analis", bio:"Menginisiasi perbaikan SOP lintas tim dan mempercepat SLA internal melalui otomasi pelaporan.", tags:["Impact tinggi","Kolaboratif"], photo:"https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=900&q=60" },
    { id:"e02", name:"Raka Pratama", unit:"Direktorat B", role:"Pengembang Sistem", bio:"Meningkatkan stabilitas aplikasi dengan observability + perbaikan performa.", tags:["Ownership","Quality-first"], photo:"https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=900&q=60" },
    { id:"e03", name:"Nadia Salsabila", unit:"Direktorat C", role:"Koordinator", bio:"Menjaga ritme eksekusi program dan koordinasi stakeholder secara rapi.", tags:["Leadership","Empatik"], photo:"https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=900&q=60" },
    { id:"e04", name:"Fajar Wicaksana", unit:"Direktorat A", role:"Auditor", bio:"Menguatkan kontrol internal dan membuat checklist audit yang memudahkan tindak lanjut.", tags:["Teliti","Akuntabel"], photo:"https://images.unsplash.com/photo-1527980965255-d3b416303d12?auto=format&fit=crop&w=900&q=60" },
    { id:"e05", name:"Siti Rahma", unit:"Direktorat B", role:"Pelayanan Publik", bio:"Meningkatkan kepuasan pemohon lewat perbaikan template respon dan alur konsultasi.", tags:["Service excellence","Solutif"], photo:"https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?auto=format&fit=crop&w=900&q=60" },
    { id:"e06", name:"Dimas Alamsyah", unit:"Direktorat C", role:"Data Specialist", bio:"Membangun dashboard monitoring KPI real-time yang mudah dipahami.", tags:["Data-driven","Proaktif"], photo:"https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=900&q=60" },
  ];

  // ====== UI ======
  const el = (id)=>document.getElementById(id);
  el("period").textContent = `Periode: ${PERIOD}`;

  let selected = null;

  function renderGrid(){
    const g = el("grid");
    g.innerHTML = "";
    CANDIDATES.forEach(c=>{
      const d = document.createElement("div");
      d.className = "card";
      d.innerHTML = `
        <div class="top">
          <div class="ava"><img src="${c.photo}" alt="Foto ${c.name}" loading="lazy"></div>
          <div style="min-width:0">
            <div class="name">${c.name}</div>
            <div class="meta">${c.unit} • ${c.role}</div>
          </div>
        </div>
        <div class="pill">Klik untuk detail & vote</div>
      `;
      d.addEventListener("click", ()=>openDetail(c.id));
      g.appendChild(d);
    });
  }

  function openDetail(id){
    selected = CANDIDATES.find(x=>x.id===id);
    if(!selected) return;

    el("pImg").src = selected.photo;
    el("pName").textContent = selected.name;
    el("pMeta").textContent = `${selected.unit} • ${selected.role}`;
    el("pBio").textContent = selected.bio;

    const chips = el("pChips");
    chips.innerHTML = "";
    selected.tags.forEach(t=>{
      const s = document.createElement("span");
      s.className = "chip";
      s.textContent = t;
      chips.appendChild(s);
    });

    el("toast").textContent = "";
    el("panel").style.display = "grid";
    window.scrollTo({top: document.body.scrollHeight, behavior:"smooth"});
  }

  el("btnClose").addEventListener("click", ()=>{
    el("panel").style.display = "none";
    selected = null;
  });

  // ====== AUTH (Netlify Identity email login) ======
  function user(){
    return window.netlifyIdentity?.currentUser?.();
  }

  function refreshAuthUI(){
    const u = user();
    el("btnLogin").style.display = u ? "none" : "inline-flex";
    el("btnLogout").style.display = u ? "inline-flex" : "none";
    el("authState").textContent = u
      ? `Status: login sebagai ${u.email}`
      : "Status: belum login";
  }

  el("btnLogin").addEventListener("click", ()=>{
    window.netlifyIdentity.open();
  });
  el("btnLogout").addEventListener("click", ()=>{
    window.netlifyIdentity.logout();
  });

  // ====== VOTE submit (ke Netlify Function) ======
  el("btnVote").addEventListener("click", async ()=>{
    const u = user();
    if(!u){
      el("toast").textContent = "Silakan login dulu (email) untuk vote.";
      window.netlifyIdentity.open();
      return;
    }
    if(!selected){
      el("toast").textContent = "Pilih kandidat dulu.";
      return;
    }

    try{
      const token = await u.jwt();
      const res = await fetch("/.netlify/functions/vote", {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({
          period: PERIOD,
          candidateId: selected.id
        })
      });
      const data = await res.json();
      if(!res.ok){
        el("toast").textContent = data?.error || "Gagal vote.";
        return;
      }
      el("toast").textContent = `✅ Vote diterima. Kamu memilih: ${selected.name}.`;
    }catch(err){
      el("toast").textContent = "Error jaringan / server.";
    }
  });

  el("btnAdmin").addEventListener("click", ()=> location.href="/admin.html");

  // init
  renderGrid();
  window.netlifyIdentity && window.netlifyIdentity.on("init", refreshAuthUI);
  window.netlifyIdentity && window.netlifyIdentity.on("login", ()=>{ refreshAuthUI(); window.netlifyIdentity.close(); });
  window.netlifyIdentity && window.netlifyIdentity.on("logout", refreshAuthUI);

  // In case widget loads after
  setTimeout(refreshAuthUI, 800);
</script>
</body>
</html>
